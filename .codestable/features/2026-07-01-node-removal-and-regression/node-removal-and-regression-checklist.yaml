feature: 2026-07-01-node-removal-and-regression
created: 2026-07-01

steps:
  - action: "依赖盘点：确认旧 Node 本地 API 是否仍在运行态主路径"
    exit_signal: "待删或待停用的旧桥接清单明确"
    status: pending
  - action: "运行时清理：删除或停用旧 Node 本地 API 依赖"
    exit_signal: "桌面运行态不再依赖旧 Node 桥接"
    status: pending
  - action: "构建验证：执行 Wails 构建"
    exit_signal: "`wails build` 成功产出桌面包"
    status: pending
  - action: "回归与文档：完成核心路径烟测并同步命令说明"
    exit_signal: "核心桌面路径与文档更新具备证据"
    status: pending

checks:
  - item: "桌面运行主入口已切到 Wails"
    source: 名词契约
    status: pending
  - item: "清理顺序先验证再删除，不提前破坏运行态"
    source: 编排骨架
    status: pending
  - item: "Wails 入口、文档命令入口和旧桥接删除点已显式挂载"
    source: 挂载点
    status: pending
  - item: "本 feature 不新增新桌面能力"
    source: 范围守护
    status: pending
  - item: "构建与桌面回归场景可被验收核验"
    source: 验收场景
    status: pending

dod:
  commands:
    - id: CMD-001
      command: "wails build"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "wails dev"
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, diff_summary, screenshot]
  cleanliness:
    debug_output: forbidden
