feature: 2026-07-10-terminal-shift-enter
created: 2026-07-10

steps:
  - action: "快捷键动作：定义 Windows Shift+Enter 的插入行语义并覆盖动作判定"
    exit_signal: "Windows Shift+Enter 被消费并只调用一次插入行动作，普通 Enter 与非 Windows 保持放行"
    status: done
  - action: "PowerShell 编排：将代理功能键绑定到 PSReadLine AddLine"
    exit_signal: "Windows 启动配置测试证明在加载 PSReadLine 前开启 VT 输入、代理功能键注册为 AddLine、加载失败不会被静默忽略，且 pwsh 优先和 Windows PowerShell 回退使用同一配置"
    status: done
  - action: "输入接通：通过当前会话输入队列发送代理序列并回归构建"
    exit_signal: "测试证明代理序列先于随后 Enter 的回车按队列顺序写入会话，核心类型检查、测试和构建通过"
    status: done
  - action: "Windows 交互验收：验证多行编辑和最终执行"
    exit_signal: "实机确认 Shift+Enter 进入下一编辑行但不执行、Enter 执行完整多行输入；正常 PATH 覆盖 pwsh，临时 PATH 隐藏 pwsh 后覆盖 Windows PowerShell，并记录 PSReadLine 版本"
    status: done

checks:
  - item: "Windows Shift+Enter 映射为插入行动作，普通 Enter 仍为执行"
    source: 名词契约
    status: passed
  - item: "代理功能键在 PowerShell 中调用原生 AddLine"
    source: 编排骨架
    status: passed
  - item: "PSReadLine 在加载前启用 VT 输入，加载失败显式暴露"
    source: 流程级约束
    status: passed
  - item: "代理序列遵守当前会话输入队列顺序"
    source: 流程级约束
    status: passed
  - item: "终端按键处理器和 PowerShell 启动脚本是唯一挂载点"
    source: 挂载点
    status: passed
  - item: "不改变非 Windows 行为，不通过原始换行或反引号模拟 AddLine"
    source: 范围守护
    status: passed
  - item: "Windows 实机确认 Shift+Enter 续行、Enter 执行多行输入"
    source: 验收场景
    status: passed

dod:
  commands:
    - id: CMD-001
      command: npx tsc -p tsconfig.snapshot-tests.json --noEmit
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: npm run test:snapshot-coordinator
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: go test ./...
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: npm run wails:build
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, diff_summary, desktop_manual_verification]
  cleanliness:
    debug_output: forbidden
