  - action: "单仓库操作：迁移 stage、unstage、commit、pull、push、log"
    exit_signal: "核心单仓库动作均可从 Go 绑定执行"
    status: pending
  - action: "批量操作：迁移 pullAll 与 pushAll 及结果分类"
    exit_signal: "典型成功、跳过、失败语义在 Go 侧可重现"
