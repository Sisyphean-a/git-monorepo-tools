  - item: "每次动作执行后均重建最新快照"
    source: 编排骨架
    status: pending
  - item: "MutateRepo、RunBatch、GetRepoLog 已挂到 Wails 绑定"
    source: 挂载点
    status: pending
  - item: "本 feature 不要求迁移 AI commit"
    source: 范围守护
