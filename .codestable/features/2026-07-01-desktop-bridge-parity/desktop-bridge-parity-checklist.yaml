  - item: "前端通过 Wails 绑定直达桌面桥接层"
    source: 编排骨架
    status: pending
  - item: "四类系统入口均已显式挂载"
    source: 挂载点
    status: pending
  - item: "本 feature 不承诺跨平台兼容"
    source: 范围守护
    status: pending
  - item: "目录选择与本机动作场景可被验收核验"
    source: 验收场景
