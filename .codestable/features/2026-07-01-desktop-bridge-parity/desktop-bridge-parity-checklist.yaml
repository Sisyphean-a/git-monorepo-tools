    exit_signal: "选择目录与取消目录均返回预期结果"
    status: pending
  - action: "本机动作：迁移打开文件夹、终端、冲突工具"
    exit_signal: "三类动作均能从前端触发"
    status: pending
  - action: "参数校验：补齐路径校验与异常显式失败"
