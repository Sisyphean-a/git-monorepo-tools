roadmap: go-wails2-migration
created: 2026-07-01

items:
  - slug: wails-shell-bootstrap
    description: 建立 Wails2 宿主工程并通过 Go 绑定跑通首屏真实仓库快照
    depends_on: []
    status: done
    feature: 2026-07-01-wails-shell-bootstrap
    minimal_loop: true
    notes: 冻结 AppSnapshot 与设置请求契约，作为后续迁移共同输入

  - slug: git-operation-parity
    description: 将仓库扫描与单仓库/批量 Git 操作迁移到 Go 并保持现有错误语义
    depends_on: [wails-shell-bootstrap]
    status: in-progress
    feature: 2026-07-01-git-operation-parity
    minimal_loop: false
    notes: 覆盖 snapshot、log、stage、unstage、commit、pull、push、pullAll、pushAll

  - slug: desktop-bridge-parity
    description: 将目录选择和本地系统动作迁移到 Wails 与 Go 桥接
    depends_on: [wails-shell-bootstrap]
    status: in-progress
    feature: 2026-07-01-desktop-bridge-parity
    minimal_loop: false
    notes: 第一阶段只要求 Windows 等价

  - slug: ai-commit-parity
    description: 将 staged diff 预处理与 AI commit 候选生成迁移到 Go
    depends_on: [git-operation-parity]
    status: in-progress
    feature: 2026-07-01-ai-commit-parity
    minimal_loop: false
    notes: 保持 staged-only、摘要化与候选输出结构不变

  - slug: frontend-transport-cutover
    description: 用 Wails 绑定替换前端的 /api fetch 流程并清理 Vite 本地 API 假设
    depends_on: [git-operation-parity, desktop-bridge-parity, ai-commit-parity]
    status: in-progress
    feature: 2026-07-01-frontend-transport-cutover
    minimal_loop: false
    notes: 完成后 React UI 不再依赖 Node 本地 API

  - slug: node-removal-and-regression
    description: 删除 Node 本地 API 运行时依赖并完成 Wails 开发构建与桌面回归扫尾
    depends_on: [frontend-transport-cutover]
    status: in-progress
    feature: 2026-07-01-node-removal-and-regression
    minimal_loop: false
    notes: 包含脚本清理、命令更新、wails build 验证与关键路径烟测
