schema_version: 1
goal: "change-diff-expansion"
status: complete
objective: "移除终端 Shift+Enter 的特殊功效，并把变更列表的文件点击行为改为展开或收起对应代码差异，不再切换文件暂存状态。"
start_point: "当前 Windows 终端会把 Shift+Enter 转换为 PowerShell AddLine；变更列表中的每个文件行直接触发暂存或取消暂存，且此前的文件 diff 数据链路已被移除。"
acceptance:
  - "Shift+Enter 不再触发插入行或其他自定义功效，终端保留普通输入行为。"
  - "点击任一变更文件会在该行下方展开真实代码差异，再次点击可收起；切换文件时展示对应内容。"
  - "已暂存、未暂存和未跟踪文件都按各自状态展示正确差异，加载失败显式展示。"
  - "点击文件不会改变暂存状态，现有明确的批量暂存与取消暂存操作保持可用。"
  - "类型检查、前端测试、Go 测试和桌面构建通过，并完成独立代码审查与功能验收。"
non_goals:
  - "不新增逐行或逐块暂存。"
  - "不重做整个工作区布局或视觉主题。"
  - "不引入第三方 diff 编辑器。"
