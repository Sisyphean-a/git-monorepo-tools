schema_version: 1
goal: "repo-terminal-tab"
status: complete
objective: "在当前项目中为主工作区新增仓库级持久化终端 Tab，支持 Windows ConPTY 交互终端与每仓库独立会话，并在切换仓库/Tab/关闭应用时维持或清理正确生命周期。"
start_point: "当前主工作区只有“变更/历史”两个 Tab；头部“终端”按钮只会拉起系统外部终端，没有内嵌交互式终端，也没有仓库级会话持久化。"
acceptance:
  - "主工作区顶部新增“终端”Tab，并能在当前仓库目录显示交互式终端。"
  - "Windows 路径使用真实 ConPTY，支持 PowerShell/pwsh、Ctrl+C、方向键、彩色输出和 resize。"
  - "每个仓库拥有独立 terminal session；切换仓库或切换“变更/历史/终端”Tab 都不会销毁已创建会话。"
  - "关闭应用时统一清理所有终端进程。"
  - "完成代码验证与独立功能验收。"
non_goals:
  - "不重做现有变更面板、历史面板和整体视觉主题。"
  - "不新增终端设置页或复杂 shell 配置 UI。"
  - "不扩展为多标签页、多分屏或跨仓库共享终端。"
